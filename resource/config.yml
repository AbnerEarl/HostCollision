# 请求相关配置
http:
  # 从主机读取数据的超时时间(单位: 秒)
  readTimeout: 10
  # 连接主机的超时时间(单位: 秒)
  connectTimeout: 10

  # 单一代理设置（与代理池互斥，代理池优先级更高）
  proxy:
    # 判断是否启动代理
    isStart: false
    # 代理地址
    host: "127.0.0.1"
    # 代理端口
    port: 8080
    # 代理账号
    username: ""
    # 代理密码
    password: ""

  # 代理池设置（启用后将忽略单一代理配置，自动轮换代理IP）
  # 文件格式: 每行一个代理地址，支持以下格式:
  #   http://ip:port
  #   http://user:pass@ip:port
  #   socks5://ip:port
  #   ip:port (默认视为http代理)
  proxyPool:
    # 判断是否启动代理池
    isStart: false
    # 代理池文件路径
    filePath: "./dataSource/proxyList.txt"

  # 扫描协议
  scanProtocol:
    # 用于判断是否启动 http 协议,进行 host 碰撞
    isScanHttp: true
    # 用于判断是否启动 https 协议,进行 host 碰撞
    isScanHttps: true

  # 绝对错误的host地址
  # 没事不要改它, 实在要改也要改成一个绝对不可能解析的成功的地址
  errorHost: "error.hchostjwdlh666666.com"

  # 相对主机名
  # 没事也不用改它, 拿来做二次匹配的
  relativeHostName: "q1w2e3sr4."

# 相似度比例
# 1 = 100%, 0.7 = 70%
# 主要用来 host碰撞请求 对比 原请求 与 绝对host错误请求的相似度 超过多少会被认为不存在该问题
# 例如:
#   host碰撞请求 与 原请求 相似度超过0.7则认为不存在该问题
#   host碰撞请求 与 绝对host错误请求的 相似度超过0.7则认为不存在该问题
similarityRatio: 0.7

# 程序运行的最大线程总数(即goroutine并发数)
# 最小值为1, 小于等于0, 会重置为1
# 注意:
#   会自动根据输入的ip总数,来动态启动goroutine执行任务
#   设置6的话,意思是最多可以开几个goroutine来执行任务的意思
threadTotal: 6

# host碰撞的数据来源地址
dataSource:
  # ip 数据来源地址
  ipFilePath: "./dataSource/ipList.txt"
  # host 数据来源地址
  hostFilePath: "./dataSource/hostList.txt"

# 默认的结果输出格式
# 格式有二种分别是 csv, txt
defaultResultOutput:
  isOutputCsv: true
  isOutputTxt: true

# 判断是否将错误日志输出
# 开启以后 站点访问失败/host碰撞失败 的结果都会输出到命令行中,方便实时查看
isOutputErrorLog: true

# 认为碰撞成功的状态码
# 支持使用逗号分割多个状态码<例如: 200,301,302>
# 为空表示关闭该功能
# 注: 开启该功能可以在某些场景获得更好的体验
collisionSuccessStatusCode: "200,301,302,404"

# 黑名单相关配置
# 该功能是用于简单的识别waf而产生的,本质上也是为了减少误报
# 经过实战的使用,发现大厂中对于host碰撞是会有waf进行干扰的,因此需要添加该配置识别waf的一些特征,减少误报
blacklists:
  # http请求,header头,Service字段的黑名单列表
  httpServices:
    - "waf"
  # http请求,body的黑名单列表
  httpBodies:
    - 'document.getElementById("mainFrame").src="http://batit.aliyun.com/alww.html";'
    - "服务器安全狗防护验证页面"
    - "该网站暂时无法进行访问，可能由以下原因导致"
    - "本网站尚未进行备案"
    - "重获备案号后，如何恢复访问"
    - "您的请求在Web服务器中没有找到对应的站点"
    - "检查是否已经绑定到对应站点，若确认已绑定，请尝试重载Web服务"
    - "您没有将此域名或IP绑定到对应站点"
    - "若您使用了CDN产品，请尝试清除CDN缓存"
    - "该访问行为触发了WAF安全策略"
    - "请将本页面截图以及您正访问的链接地址提交给信息安全中心以需求帮助"
  # http请求,header头,X-Powered-By字段的黑名单列表
  httpXPoweredBy:
    - "waf"

# 数据样本
# 该功能是用于加强host碰撞的检测功能而生的,开启以后可以有效的减少误报问题
# 主要是用来防止一个相同的站点里面有,大于一个以上不同的返回值,而导致的误报问题
dataSample:
  # 样本请求次数
  # 最小值为0, 小于等于0, 表示关闭该功能
  # 程序将会拿该参数,请求n次作为数据的匹配样本
  # 建议: 建议设置为10次或是以上,因为如果样本少了,那么就没有任何的意义
  number: 10

# 防检测/防封禁配置
# 用于对抗 WAF 限流、IP 封禁、行为检测等安全策略
antiDetection:
  # User-Agent 随机化
  # 每次请求从内置的 UA 池中随机选取一个 User-Agent
  # 注意: 同一个 IP+协议 的基础请求/错误请求/碰撞请求 会使用相同的 UA
  #       以避免因 UA 不同导致返回内容不同而造成误判
  #       UA 随机化主要体现在不同 IP 之间
  randomUA: true

  # Header 伪造（Bypass WAF）
  # 通过添加额外的请求头，伪装请求来源，绕过 WAF 的 IP 白名单检测
  # 常用的 WAF 绕过 Header:
  #   X-Forwarded-For: 伪造来源IP
  #   X-Real-IP: 伪造真实IP
  #   X-Originating-IP: 伪造源IP
  #   X-Client-IP: 伪造客户端IP
  #   CF-Connecting-IP: 伪造 Cloudflare 连接IP
  fakeHeaders:
    isStart: true
    headers:
      X-Forwarded-For: "127.0.0.1"
      X-Real-IP: "127.0.0.1"
      X-Originating-IP: "127.0.0.1"
      X-Client-IP: "127.0.0.1"
      CF-Connecting-IP: "127.0.0.1"

  # 速率控制（每秒最大请求数）
  # 0 表示不限制
  # 建议: 设置为 30~50，避免触发 WAF 限流规则
  # 命令行参数 -rate 可覆盖此配置
  rateLimit: 50

  # 延迟扫描（请求间隔随机化）
  # 每次请求之间随机等待 minMs~maxMs 毫秒
  # 用于避免请求频率固定而被行为检测识别
  # 注意: 延迟扫描与速率控制同时生效，取两者中更慢的速度
  delay:
    isStart: true
    # 最小间隔（毫秒）
    minMs: 1000
    # 最大间隔（毫秒）
    maxMs: 3000