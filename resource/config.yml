# 请求相关配置
http:
  # 从主机读取数据的超时时间(单位: 秒)
  # 正常Web服务响应通常<3秒，8秒足够覆盖慢速服务
  readTimeout: 8
  # 连接主机的超时时间(单位: 秒)
  # TCP连接建立通常<1秒，5秒足够覆盖高延迟网络，减少对不可达IP的等待
  connectTimeout: 5

  # 单一代理设置（与代理池互斥，代理池优先级更高）
  proxy:
    # 判断是否启动代理
    isStart: false
    # 代理地址
    host: "127.0.0.1"
    # 代理端口
    port: 8080
    # 代理账号
    username: ""
    # 代理密码
    password: ""

  # 代理池设置（启用后将忽略单一代理配置，自动轮换代理IP）
  # 文件格式: 每行一个代理地址，支持以下格式:
  #   http://ip:port
  #   http://user:pass@ip:port
  #   socks5://ip:port
  #   ip:port (默认视为http代理)
  proxyPool:
    # 判断是否启动代理池
    isStart: false
    # 代理池文件路径
    filePath: "./dataSource/proxyList.txt"

  # 扫描协议
  scanProtocol:
    # 用于判断是否启动 http 协议,进行 host 碰撞
    isScanHttp: true
    # 用于判断是否启动 https 协议,进行 host 碰撞
    isScanHttps: true

  # 绝对错误的host地址
  # 没事不要改它, 实在要改也要改成一个绝对不可能解析的成功的地址
  errorHost: "error.hchostjwdlh666666.com"

  # 相对主机名
  # 没事也不用改它, 拿来做二次匹配的
  relativeHostName: "q1w2e3sr4."

# 相似度比例
# 1 = 100%, 0.7 = 70%
# 主要用来 host碰撞请求 对比 原请求 与 绝对host错误请求的相似度 超过多少会被认为不存在该问题
# 例如:
#   host碰撞请求 与 原请求 相似度超过0.7则认为不存在该问题
#   host碰撞请求 与 绝对host错误请求的 相似度超过0.7则认为不存在该问题
similarityRatio: 0.7

# 程序运行的最大线程总数(即goroutine并发数)
# 最小值为1, 小于等于0, 会重置为1
# 注意:
#   会自动根据输入的ip总数,来动态启动goroutine执行任务
#   Host碰撞主要是I/O等待(网络请求)，CPU占用极低
#   30个线程可以充分利用I/O等待时间，全局速率限制器控制总QPS
threadTotal: 30

# host碰撞的数据来源地址
dataSource:
  # ip 数据来源地址
  ipFilePath: "./dataSource/ipList.txt"
  # host 数据来源地址
  hostFilePath: "./dataSource/hostList.txt"

# 默认的结果输出格式
# 格式有二种分别是 csv, txt
defaultResultOutput:
  isOutputCsv: true
  isOutputTxt: true

# 判断是否将错误日志输出
# 开启以后 站点访问失败/host碰撞失败 的结果都会输出到命令行中,方便实时查看
isOutputErrorLog: true

# 认为碰撞成功的状态码
# 支持使用逗号分割多个状态码<例如: 200,301,302>
# 为空表示关闭该功能
# 注: 开启该功能可以在某些场景获得更好的体验
collisionSuccessStatusCode: "200,301,302,404"

# 黑名单相关配置
# 该功能是用于简单的识别waf而产生的,本质上也是为了减少误报
# 经过实战的使用,发现大厂中对于host碰撞是会有waf进行干扰的,因此需要添加该配置识别waf的一些特征,减少误报
blacklists:
  # http请求,header头,Service字段的黑名单列表
  httpServices:
    - "waf"
  # http请求,body的黑名单列表
  httpBodies:
    - 'document.getElementById("mainFrame").src="http://batit.aliyun.com/alww.html";'
    - "服务器安全狗防护验证页面"
    - "该网站暂时无法进行访问，可能由以下原因导致"
    - "本网站尚未进行备案"
    - "重获备案号后，如何恢复访问"
    - "您的请求在Web服务器中没有找到对应的站点"
    - "检查是否已经绑定到对应站点，若确认已绑定，请尝试重载Web服务"
    - "您没有将此域名或IP绑定到对应站点"
    - "若您使用了CDN产品，请尝试清除CDN缓存"
    - "该访问行为触发了WAF安全策略"
    - "请将本页面截图以及您正访问的链接地址提交给信息安全中心以需求帮助"
  # http请求,header头,X-Powered-By字段的黑名单列表
  httpXPoweredBy:
    - "waf"

# 数据样本
# 该功能是用于加强host碰撞的检测功能而生的,开启以后可以有效的减少误报问题
# 主要是用来防止一个相同的站点里面有,大于一个以上不同的返回值,而导致的误报问题
dataSample:
  # 样本请求次数
  # 最小值为0, 小于等于0, 表示关闭该功能
  # 程序将会拿该参数,请求n次作为数据的匹配样本
  # 3次样本已足够建立可靠的基准比对，减少大数据量下的额外请求开销
  number: 3

# 防检测/防封禁配置
# 用于对抗 WAF 限流、IP 封禁、行为检测等安全策略
antiDetection:
  # User-Agent 随机化
  # 每次请求从内置的 UA 池中随机选取一个 User-Agent
  # 注意: 同一个 IP+协议 的基础请求/错误请求/碰撞请求 会使用相同的 UA
  #       以避免因 UA 不同导致返回内容不同而造成误判
  #       UA 随机化主要体现在不同 IP 之间
  randomUA: true

  # Header 伪造（Bypass WAF）
  # 通过添加额外的请求头，伪装请求来源，绕过 WAF 的 IP 白名单检测
  # 常用的 WAF 绕过 Header:
  #   X-Forwarded-For: 伪造来源IP
  #   X-Real-IP: 伪造真实IP
  #   X-Originating-IP: 伪造源IP
  #   X-Client-IP: 伪造客户端IP
  #   CF-Connecting-IP: 伪造 Cloudflare 连接IP
  fakeHeaders:
    isStart: true
    headers:
      X-Forwarded-For: "127.0.0.1"
      X-Real-IP: "127.0.0.1"
      X-Originating-IP: "127.0.0.1"
      X-Client-IP: "127.0.0.1"
      CF-Connecting-IP: "127.0.0.1"

  # 速率控制（每秒最大请求数）
  # 0 表示不限制
  # 200 QPS 分散到 1000+ 个不同IP上，每个IP实际约 0.2 QPS，远低于WAF阈值
  # 命令行参数 -rate 可覆盖此配置
  rateLimit: 200

  # 延迟扫描（请求间隔随机化）
  # 每次请求之间随机等待 minMs~maxMs 毫秒
  # 用于避免请求频率固定而被行为检测识别
  # 注意: 延迟扫描与速率控制同时生效，取两者中更慢的速度
  # 配合速率限制器已有全局QPS控制，延迟主要用于随机化请求间隔
  delay:
    isStart: true
    # 最小间隔（毫秒）- 50ms已足够产生随机性
    minMs: 50
    # 最大间隔（毫秒）- 配合50ms最小值，平均延迟125ms
    maxMs: 200

# 优化策略配置
# 用于大数据量场景下减少无效碰撞请求，提升碰撞效率
# 当数据量较小（预估1小时内可完成）时，会自动使用全量扫描，忽略优化策略
optimization:
  # DNS 反向筛选
  # 对 Host 列表进行 DNS 解析，过滤与目标 IP 无关的 Host
  # 保留: DNS 解析到目标 IP 段的 Host + DNS 解析失败的 Host（可能是已下线域名）
  # 过滤: DNS 解析到完全无关 IP 的 Host
  enableDNSFilter: true

  # DNS 匹配模式
  # "16": /16 网段匹配（宽松，默认）- 前两段IP相同即匹配
  # "24": /24 网段匹配（严格）- 前三段IP相同即匹配
  # "exact": 精确 IP 匹配（最严格）- IP完全相同才匹配
  dnsMatchMode: "16"

  # DNS 解析并发数
  # DNS解析是纯I/O操作，不涉及目标服务器，100并发可加速DNS筛选阶段
  dnsConcurrency: 100

  # 响应快速排除
  # 对每个 IP 碰撞前 N 个随机 Host，如果所有响应指纹都相同，
  # 说明该 IP 不做基于 Host 的路由，跳过剩余 Host
  enableResponseElimination: true

  # 响应快速排除的采样 Host 数量
  # 仅当 Host 总量大于此值时才启用采样排除
responseSampleSize: 50

  # 是否强制全量扫描（忽略所有优化策略）
  fullScan: false

  # 自动全量扫描阈值
  # 当预估碰撞组合数（IP数 × 协议数 × Host数）低于此值时，自动使用全量扫描
  # 默认值 720000 约为 200QPS 下 1 小时可完成的碰撞量
  # 设为 0 表示禁用自动全量扫描
  autoFullScanThreshold: 720000

  # HEAD 预筛选（方案一）
  # 对每个 IP 先发送 HEAD 请求获取响应头指纹，只有指纹与基准不同的 Host 才进入 GET 碰撞
  # 安全保障：如果服务不支持 HEAD 方法（返回 405/501），会自动回退到 GET 碰撞
  # 如果 HEAD 筛选后候选数量过少（<5%），也会自动回退到全量 GET 碰撞
  enableHEADPreFilter: true

  # TLS 证书 SAN 提取（方案二）
  # 对 HTTPS 端口做 TLS 握手，提取证书中的域名列表（Subject Alternative Name）
  # 匹配的域名标记为最高优先级（P0），排在碰撞列表最前面
  # 支持各种 IP 格式：纯IP默认扫描443端口，带端口的IP扫描指定端口
  enableTLSScan: true
  # TLS 扫描并发数
  # TLS握手是一次性操作，每个IP只做一次，不携带Host头，不触发WAF
  tlsScanConcurrency: 50

  # 基准指纹缓存 + 快速比对（方案三）
  # 使用 FNV-1a hash 算法预计算基准响应的指纹
  # 碰撞时先用 hash 做 O(n) 快速比对，hash 相同直接判定为失败
  # 只有 hash 不同时才做 O(n*m) 的编辑距离计算，大幅减少重量级计算
  enableFingerprintCache: true

  # 自适应分阶段采样（方案五）
  # 替代固定采样排除，分三个阶段逐步增加采样数量：
  #   阶段1: 采样 50 个 Host
  #   阶段2: 采样 200 个 Host
#   阶段3: 采样 50 个 Host（即 responseSampleSize）
  # 对明显无效的 IP 可以在阶段1就快速跳过
  # WAF 拦截的响应不计入指纹比对，避免 WAF 干扰判断
  enableAdaptiveSampling: true

  # 万能响应IP检测（方案六）
  # 当一个 IP 对大量不同 Host 都碰撞成功时，判定为"万能响应"IP
  # 这类 IP 通常是默认虚拟主机、通配符配置、或者对任何 Host 头都返回相同/相似内容的服务器
  # 检测到后会自动回溯清除该 IP 的所有碰撞结果，并跳过剩余 Host
  enableCatchAllDetection: true
  # 万能响应IP判定阈值
  # 当一个 IP+协议 维度碰撞成功的 Host 数量超过此值时，判定为万能响应IP
  # 建议值: 10（正常情况下一个 IP 不太可能有超过 10 个不同的有效 Host 碰撞成功）
  # 如果业务场景中确实存在单 IP 多 Host 的情况，可适当调大此值
  catchAllThreshold: 10